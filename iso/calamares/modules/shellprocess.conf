---
# Run in the installed system (chroot)
dontChroot: false
timeout: 300

jobs:
  # Remove live-only Calamares, desktop, and installer packages
  - command: >-
      apt-get remove -yq --purge
      calamares openbox xorg xinit xterm hsetroot
      lightdm x11-common
      2>/dev/null || true

  # Clean up apt cache to save space
  - command: "apt-get autoremove -yq 2>/dev/null || true"
  - command: "apt-get clean 2>/dev/null || true"

  # Remove the live-installer auto-start config
  - command: "rm -f /root/.xinitrc /root/.profile_calamares"
  - command: "rm -f /etc/systemd/system/nexis-live-installer.service"
  - command: "rm -f /etc/systemd/system/getty@tty1.service.d/calamares.conf"

  # Make sure NeXiS Python venv is intact
  - command: >-
      test -d /opt/nexis-hypervisor/venv ||
      python3 -m venv /opt/nexis-hypervisor/venv

  # Install Python deps if not present
  - command: >-
      /opt/nexis-hypervisor/venv/bin/pip install -q --upgrade pip
      2>/dev/null || true
  - command: >-
      /opt/nexis-hypervisor/venv/bin/pip install -q
      -r /opt/nexis-hypervisor/daemon/requirements.txt
      2>/dev/null || true
