---
# Services to enable in the installed system
services:
  - name: libvirtd
    enabled: true
  - name: ssh
    enabled: true
  - name: nexis-hypervisor
    enabled: true
  - name: nexis-firstboot
    enabled: true

# Services to disable (remove live-only services)
targets:
  - name: nexis-live-installer
    enabled: false
